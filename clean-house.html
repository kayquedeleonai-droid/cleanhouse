<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean House</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef7ff, #f8fbff);
      color: #14213d;
      padding: 24px;
    }

    .app {
      max-width: 460px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: white;
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.25);
      margin-bottom: 22px;
    }

    .header span {
      font-size: 14px;
      opacity: .9;
    }

    .header h1 {
      font-size: 34px;
      margin-top: 6px;
    }

    .card {
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(12px);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: #f1f5f9;
      border-radius: 18px;
      padding: 16px;
    }

    .stat small {
      color: #64748b;
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
    }

    .progress-wrap {
      margin-top: 18px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #475569;
      margin-bottom: 8px;
    }

    .progress {
      height: 12px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #14b8a6);
      border-radius: 999px;
      transition: width .3s ease;
    }

    .counter {
      text-align: center;
    }

    .counter h2 {
      font-size: 72px;
      line-height: 1;
      margin: 12px 0;
      color: #0f172a;
    }

    .counter p {
      color: #64748b;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .danger {
      background: #fee2e2;
      color: #b91c1c;
      width: 100%;
      margin-top: 10px;
    }

    .history li {
      list-style: none;
      padding: 13px 0;
      border-bottom: 1px solid #e2e8f0;
      color: #334155;
      font-size: 14px;
    }

    .history li:last-child {
      border-bottom: none;
    }

    .done {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <span>Controle de pagamento por limpeza</span>
      <h1>Clean House</h1>
    </section>

    <section class="card">
      <div class="grid">
        <div class="stat">
          <small>Valor do iPhone</small>
          <strong>R$ 1.000</strong>
        </div>
        <div class="stat">
          <small>Valor por limpeza</small>
          <strong>R$ 50</strong>
        </div>
        <div class="stat">
          <small>Total necessário</small>
          <strong>20x</strong>
        </div>
        <div class="stat">
          <small>Saldo restante</small>
          <strong id="saldo">R$ 1.000</strong>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progresso</span>
          <span id="percentual">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="barra"></div>
        </div>
      </div>
    </section>

    <section class="card counter" id="statusCard">
      <p>Limpezas realizadas</p>
      <h2 id="contador">0</h2>
      <p id="statusTexto">Ainda faltam 20 limpezas.</p>

      <div class="actions">
        <button class="secondary" onclick="removerLimpeza()">- Remover</button>
        <button class="primary" onclick="adicionarLimpeza()">+ Salvar limpeza</button>
      </div>

      <button class="danger" onclick="resetar()">Resetar controle</button>
    </section>

    <section class="card">
      <h3>Histórico</h3>
      <ul class="history" id="historico"></ul>
    </section>
  </main>

  <script>
    const valorTotal = 1000;
    const valorLimpeza = 50;
    const totalLimpezas = valorTotal / valorLimpeza;

    let limpezas = Number(localStorage.getItem("cleanHouseLimpezas")) || 0;
    let historico = JSON.parse(localStorage.getItem("cleanHouseHistorico")) || [];

    function salvar() {
      localStorage.setItem("cleanHouseLimpezas", limpezas);
      localStorage.setItem("cleanHouseHistorico", JSON.stringify(historico));
    }

    function atualizarTela() {
      const pago = limpezas * valorLimpeza;
      const saldo = Math.max(valorTotal - pago, 0);
      const percentual = Math.min((pago / valorTotal) * 100, 100);
      const faltam = Math.max(totalLimpezas - limpezas, 0);

      document.getElementById("contador").textContent = limpezas;
      document.getElementById("saldo").textContent = `R$ ${saldo.toLocaleString("pt-BR")}`;
      document.getElementById("percentual").textContent = `${Math.round(percentual)}%`;
      document.getElementById("barra").style.width = `${percentual}%`;

      const statusCard = document.getElementById("statusCard");
      const statusTexto = document.getElementById("statusTexto");

      if (saldo === 0) {
        statusCard.classList.add("done");
        statusTexto.textContent = "Pagamento concluído!";
      } else {
        statusCard.classList.remove("done");
        statusTexto.textContent = `Ainda faltam ${faltam} limpezas.`;
      }

      const lista = document.getElementById("historico");
      lista.innerHTML = "";

      if (historico.length === 0) {
        lista.innerHTML = "<li>Nenhuma limpeza registrada ainda.</li>";
        return;
      }

      historico.slice().reverse().forEach((item, index) => {
        const li = document.createElement("li");
        li.textContent = `${historico.length - index}ª limpeza salva em ${item}`;
        lista.appendChild(li);
      });
    }

    function adicionarLimpeza() {
      if (limpezas >= totalLimpezas) return;

      limpezas++;
      const data = new Date().toLocaleString("pt-BR");
      historico.push(data);
      salvar();
      atualizarTela();
    }

    function removerLimpeza() {
      if (limpezas <= 0) return;

      limpezas--;
      historico.pop();
      salvar();
      atualizarTela();
    }

    function resetar() {
      const confirmar = confirm("Tem certeza que deseja resetar o controle?");
      if (!confirmar) return;

      limpezas = 0;
      historico = [];
      salvar();
      atualizarTela();
    }

    atualizarTela();
  </script>
</body>
</html>
